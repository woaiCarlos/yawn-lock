<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sleepy Lock — 权限</title>
<style>
:root{
  --bg:#fafafa; --surface:#ffffff;
  --fg:#1a1a2e; --muted:#6b6b6b; --border:#ece6f8;
  --accent:#6750a4; --accent-2:#b69df8; --accent-soft:#f3edff;
  --success:#17a34a; --warn:#eab308; --danger:#dc2626;
  --night-1:#1a1a2e;
  --font-display:"Inter",-apple-system,system-ui,sans-serif;
  --font-body:"Inter",-apple-system,system-ui,sans-serif;
  --font-mono:ui-monospace,"JetBrains Mono",monospace;
  --radius-sm:12px; --radius-md:20px; --radius-lg:28px; --radius-xl:36px; --radius-pill:9999px;
  --ease-standard:cubic-bezier(0.2,0,0,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:radial-gradient(ellipse at top,#2a2348 0%,#0e0e16 70%);
  font-family:var(--font-body);-webkit-font-smoothing:antialiased;color:var(--fg);
  min-height:100vh;display:grid;place-items:center;
  padding:40px 20px;
}

.phone{
  width:412px;height:900px;background:var(--bg);
  border-radius:48px;overflow:hidden;
  box-shadow:
    0 0 0 2px #2a2a3a,
    0 0 0 10px #14141c,
    0 40px 80px rgba(0,0,0,.55);
  position:relative;display:flex;flex-direction:column;
}
.statusbar{
  height:34px;display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;font-size:13px;font-weight:600;color:var(--night-1);
  background:transparent;flex:none;
}
.statusbar .icons{display:flex;align-items:center;gap:6px;color:var(--night-1)}
.statusbar .icons svg{width:14px;height:14px}

.appbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 10px;background:transparent;flex:none;
}
.appbar .icon-btn{
  width:48px;height:48px;border-radius:50%;background:transparent;border:0;
  display:grid;place-items:center;cursor:pointer;color:var(--night-1);transition:background 150ms;
}
.appbar .icon-btn:hover{background:var(--accent-soft)}
.appbar h1{font-size:20px;font-weight:600;letter-spacing:-0.01em;color:var(--night-1)}
.appbar .lang{font-size:12px;color:var(--accent);font-weight:600;border:1px solid var(--accent-2);border-radius:99px;padding:6px 14px;background:#fff}

.scroll{flex:1;overflow-y:auto;padding:14px 20px 100px;-ms-overflow-style:none;scrollbar-width:none;background:var(--bg)}
.scroll::-webkit-scrollbar{display:none}

.intro{
  background:linear-gradient(160deg,#f3edff 0%,#fff5e8 100%);
  border-radius:var(--radius-md);padding:18px;margin-bottom:24px;
  display:flex;gap:14px;align-items:flex-start;
}
.intro .moon{
  width:48px;height:48px;border-radius:50%;flex:none;
  background:linear-gradient(160deg,#6750a4,#2d2466);
  display:grid;place-items:center;color:#ffd97a;
}
.intro h3{font-size:15px;font-weight:600;color:var(--night-1);margin-bottom:4px}
.intro p{font-size:13px;color:var(--muted);line-height:1.5}

.perm-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.perm{
  padding:16px;display:grid;grid-template-columns:44px 1fr auto;gap:14px;
  align-items:center;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background 150ms;
}
.perm:last-child{border-bottom:0}
.perm:hover{background:var(--accent-soft)}
.perm .ico{
  width:44px;height:44px;border-radius:14px;
  background:var(--accent-soft);color:var(--accent);
  display:grid;place-items:center;flex:none;
}
.perm .name{font-size:14px;font-weight:600;color:var(--night-1)}
.perm .desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
.perm .state{
  font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;
  background:color-mix(in oklab,var(--success),white 85%);color:var(--success);
  letter-spacing:.04em;text-transform:uppercase;flex:none;
}
.perm .state.off{
  background:color-mix(in oklab,var(--warn),white 85%);color:#a87000;
}

.help{
  margin-top:18px;text-align:center;font-size:13px;color:var(--muted);
}
.help a{color:var(--accent);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h2v-8H2v8zm5 0h2V10H7v12zm5 0h2V6h-2v16zm5 0h2V2h-2v20z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7 3 2.7 5.2 0 8.8L12 22 24 8.8C21.3 5.2 17 3 12 3z"/></svg>
      <svg viewBox="0 0 26 14" fill="none"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" stroke="currentColor"/><rect x="2" y="2" width="19" height="10" rx="2" fill="currentColor"/><rect x="23.5" y="4" width="1.5" height="6" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="appbar">
    <button class="icon-btn" aria-label="返回">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1>权限</h1>
    <button class="lang">EN</button>
  </div>

  <div class="scroll">
    <div class="intro">
      <div class="moon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      </div>
      <div>
        <h3>Sleepy Lock 需要这些权限</h3>
        <p>每项权限都只用于其对应的功能,我们不会收集你的任何数据。点击下方权限可前往系统设置调整。</p>
      </div>
    </div>

    <div class="perm-list">
      <div class="perm">
        <div class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="name">悬浮窗</div>
          <div class="desc">在其他 App 上方显示倒计时与控制气泡</div>
        </div>
        <span class="state">已授权</span>
      </div>
      <div class="perm">
        <div class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="2"/><path d="M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="name">设备管理员</div>
          <div class="desc">用于到点强制锁屏,这是核心功能所需</div>
        </div>
        <span class="state">已授权</span>
      </div>
      <div class="perm">
        <div class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div>
          <div class="name">勿扰模式</div>
          <div class="desc">锁屏前自动静音 10 秒,可选</div>
        </div>
        <span class="state off">未授权</span>
      </div>
    </div>

    <div class="help">
      遇到问题? <a href="#">查看权限说明 →</a>
    </div>
  </div>
</div>
</body>
</html>
